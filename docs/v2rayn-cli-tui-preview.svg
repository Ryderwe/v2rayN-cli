    <rect x="70" y="105" width="1460" height="54" rx="26" fill="#142126"/>
    <rect x="70" y="137" width="1460" height="22" fill="#142126"/>
    <circle cx="106" cy="132" r="7" fill="#ff6b68"/>
    <circle cx="132" cy="132" r="7" fill="#f5c452"/>
    <circle cx="158" cy="132" r="7" fill="#45d082"/>
    <text class="mono dim" x="800" y="138" text-anchor="middle" font-size="14">v2rayN-cli — ui</text>
