    <text x="468" y="445" font-size="15" font-weight="700" class="bright">Tokyo Premium</text>
    <text x="876" y="445" font-size="15" class="text">edge.example.net:443</text>
    <text x="1264" y="445" font-size="14" class="dim">[main-sub]</text>

