<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071015"/>
      <stop offset="0.55" stop-color="#0b171c"/>
      <stop offset="1" stop-color="#071014"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.45" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#28d7b6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#28d7b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.58"/>
    </filter>
    <clipPath id="terminalClip">
      <rect x="94" y="132" width="1412" height="720" rx="18"/>
    </clipPath>
    <style>
