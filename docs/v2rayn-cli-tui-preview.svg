      <text x="145" y="497" class="dim">○</text><text x="193" y="497" class="text">Trojan</text><text x="351" y="497" class="amber">76ms</text><text x="468" y="497" class="text">Singapore Relay</text><text x="876" y="497" class="text">sg.example.net:443</text><text x="1264" y="497" class="dim">[main-sub]</text>
      <text x="145" y="546" class="dim">○</text><text x="193" y="546" class="text">Hysteria2</text><text x="351" y="546" class="amber">91ms</text><text x="468" y="546" class="text">Los Angeles 01</text><text x="876" y="546" class="text">us-west.example.net:8443</text><text x="1264" y="546" class="dim">[backup]</text>
      <text x="145" y="595" class="dim">○</text><text x="193" y="595" class="text">VMess</text><text x="351" y="595" class="text">128ms</text><text x="468" y="595" class="text">Frankfurt IPv6</text><text x="876" y="595" class="text">de.example.net:443</text><text x="1264" y="595" class="dim">[main-sub]</text>
      <text x="145" y="644" class="dim">○</text><text x="193" y="644" class="text">AnyTLS</text><text x="351" y="644" class="text">156ms</text><text x="468" y="644" class="text">London Auto</text><text x="876" y="644" class="text">uk.example.net:443</text><text x="1264" y="644" class="dim">[community]</text>
      <text x="145" y="693" class="dim">○</text><text x="193" y="693" class="text">TUIC</text><text x="351" y="693" class="text">188ms</text><text x="468" y="693" class="text">Sydney Edge</text><text x="876" y="693" class="text">au.example.net:443</text><text x="1264" y="693" class="dim">[backup]</text>
    </g>

    <line x1="116" y1="733" x2="1484" y2="733" stroke="#24373e"/>
    <text x="127" y="765" font-size="14" class="amber">代理已启动: Tokyo Premium</text>
    <text x="1478" y="765" text-anchor="end" font-size="13" class="dim">127.0.0.1:10808 · SOCKS5 / HTTP</text>
    <text x="127" y="812" font-size="13" class="dim">Tab 页面   ↑↓ 选择   Enter 操作   a 添加   / 搜索   s 启停   R 重启   l English   q 退出</text>
