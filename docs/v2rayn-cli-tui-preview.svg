  <g class="ui">
    <text x="94" y="925" font-size="15" fill="#71858d">Subscription · Single node · Runtime control · Live logs · 中文 / English</text>
    <text x="1506" y="925" text-anchor="end" font-size="15" font-weight="700" fill="#42e5c3">OPEN SOURCE · GPL-3.0</text>
