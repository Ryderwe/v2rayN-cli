      .ui { font-family: Inter, "SF Pro Display", "PingFang SC", sans-serif; }
      .dim { fill: #71858d; }
      .text { fill: #c9d6da; }
      .bright { fill: #eef8f7; }
      .mint { fill: #42e5c3; }
      .amber { fill: #f4c86a; }
      .blue { fill: #77bdfb; }
    </style>
