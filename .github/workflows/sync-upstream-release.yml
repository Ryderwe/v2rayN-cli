name: Sync upstream and release

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Build again even when the latest upstream Release was already processed'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sync-upstream-release
  cancel-in-progress: false

jobs:
  sync:
    name: Sync 2dust/v2rayN
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.sync.outputs.should_release }}
      mark_release: ${{ steps.sync.outputs.mark_release }}
      release_tag: ${{ steps.sync.outputs.release_tag }}
      marker_tag: ${{ steps.sync.outputs.marker_tag }}
      sync_sha: ${{ steps.sync.outputs.sync_sha }}
      upstream_release: ${{ steps.sync.outputs.upstream_release }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0

      - name: Merge upstream changes
        id: sync
        shell: bash
        env:
          FORCE_RELEASE: ${{ inputs.force_release || 'false' }}
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPOSITORY: 2dust/v2rayN
          UPSTREAM_BRANCH: master
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --no-tags upstream "${UPSTREAM_BRANCH}"

          release_json="$(curl -fsSL --retry 3 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${UPSTREAM_REPOSITORY}/releases?per_page=1")"
          upstream_release="$(jq -er '.[0].tag_name' <<< "$release_json")"
          published_at="$(jq -er '.[0].published_at' <<< "$release_json")"

          if ! git check-ref-format "refs/tags/${upstream_release}" >/dev/null; then
            echo "::error::Upstream returned an invalid release tag: ${upstream_release}"
            exit 1
          fi

          release_key="$(printf '%s' "$upstream_release" | sed 's#[^0-9A-Za-z._-]#-#g')"
          release_version="$(printf '%s' "${upstream_release#v}" | sed 's#[^0-9A-Za-z._-]#-#g')"
          marker_tag="upstream-release/${release_key}"

          git fetch --no-tags upstream \
            "refs/tags/${upstream_release}:refs/upstream-releases/${release_key}"
          upstream_release_sha="$(git rev-parse "refs/upstream-releases/${release_key}^{commit}")"

          upstream_sha="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          changed=false

          if git merge-base --is-ancestor "$upstream_sha" HEAD; then
            echo "The fork already contains upstream commit ${upstream_sha}."
          else
            echo "Merging upstream commit ${upstream_sha}."
            if ! git merge --no-edit --no-ff "$upstream_sha"; then
              git status --short
              git merge --abort || true
              echo "::error::Upstream merge failed. Resolve the conflict on master, then run this workflow again."
              exit 1
            fi
            git push origin HEAD:master
            changed=true
          fi

          sync_sha="$(git rev-parse HEAD)"
          release_short="${upstream_release_sha:0:8}"
          should_release=false
          mark_release=false
          release_tag=""

          if ! git ls-remote --exit-code --tags origin "refs/tags/${marker_tag}" >/dev/null 2>&1; then
            should_release=true
            mark_release=true
            release_tag="v${release_version}-cli.upstream.g${release_short}"
          elif [[ "$FORCE_RELEASE" == "true" ]]; then
            should_release=true
            release_tag="v${release_version}-cli.upstream.g${release_short}.${GITHUB_RUN_NUMBER}"
          fi

          {
            echo "should_release=${should_release}"
            echo "mark_release=${mark_release}"
            echo "release_tag=${release_tag}"
            echo "marker_tag=${marker_tag}"
            echo "sync_sha=${sync_sha}"
            echo "upstream_release=${upstream_release}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Upstream sync"
            echo
            echo "- Upstream commit: \`${upstream_sha}\`"
            echo "- Synced commit: \`${sync_sha}\`"
            echo "- Upstream changed: \`${changed}\`"
            echo "- Latest upstream Release: \`${upstream_release}\` (${published_at})"
            echo "- Release already processed: \`$([[ "$mark_release" == "true" ]] && echo false || echo true)\`"
            echo "- Create Release: \`${should_release}\`"
            if [[ -n "$release_tag" ]]; then
              echo "- Release tag: \`${release_tag}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build and publish synchronized source
    needs: sync
    if: needs.sync.outputs.should_release == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release-cli.yml
    with:
      release_tag: ${{ needs.sync.outputs.release_tag }}
      checkout_ref: ${{ needs.sync.outputs.sync_sha }}

  mark-release:
    name: Mark upstream Release as processed
    needs:
      - sync
      - release
    if: needs.sync.outputs.mark_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout synchronized source
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.sync.outputs.sync_sha }}
          fetch-depth: 0

      - name: Create processed marker tag
        shell: bash
        env:
          MARKER_TAG: ${{ needs.sync.outputs.marker_tag }}
          SYNC_SHA: ${{ needs.sync.outputs.sync_sha }}
          UPSTREAM_RELEASE: ${{ needs.sync.outputs.upstream_release }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${MARKER_TAG}" >/dev/null 2>&1; then
            echo "Marker ${MARKER_TAG} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$MARKER_TAG" "$SYNC_SHA" \
            -m "Processed upstream Release ${UPSTREAM_RELEASE}"
          git push origin "refs/tags/${MARKER_TAG}"
