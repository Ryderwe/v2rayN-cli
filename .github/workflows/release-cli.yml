name: Release v2rayN-cli

on:
  push:
    tags:
      - 'v*-cli.*'
  workflow_call:
    inputs:
      release_tag:
        description: 'Tag used for the GitHub Release'
        required: true
        type: string
      checkout_ref:
        description: 'Commit, branch, or tag to build'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, for example v7.23.4-cli.1'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-cli-${{ inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout_ref || github.sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip tar ca-certificates

      - name: Build self-contained package with cores
        shell: bash
        run: |
          chmod +x package-cli.sh
          ./package-cli.sh "${{ matrix.rid }}" "$GITHUB_WORKSPACE/release-cli"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.rid }}
          path: release-cli/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      RELEASE_COMMIT: ${{ inputs.checkout_ref || github.sha }}

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: sha256sum -- *.tar.gz > SHA256SUMS

      - name: List release assets
        run: ls -lh release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ env.RELEASE_COMMIT }}
          name: v2rayN-cli ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS
